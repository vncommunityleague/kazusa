linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - typecheck
    - unused
    - gosec
    #    - golint
    - goimports
  disable:
    - ineffassign
    - dupl
    - godox
    - bodyclose # too many false negatives

linters-settings:
  goimports:
    local-prefixes: github.com/vncommunityleague
